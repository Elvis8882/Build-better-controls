name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 * * 0,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping heartbeat table
        run: |
          curl -sS "${{ secrets.SUPABASE_URL }}/rest/v1/heartbeat?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}"
